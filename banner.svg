why we cannot use the banner in the same file in readme

9:02 AM
Great question! GitHub strips/sanitizes certain HTML and CSS from README files for security reasons. Here's exactly why:

What GitHub blocks in README.md:

<style> tags — all CSS is removed
style="background-color: ..." — inline styles are stripped
<svg> with embedded <image> tags pointing to external URLs — blocked by GitHub's CSP (Content Security Policy)
background-image, background-color on any element
What GitHub DOES allow:

<img src="..."> — only plain image tags
Shields/badges from whitelisted services
SVG files hosted in the same repo referenced via <img src="./banner.svg"> — this works because GitHub proxies the SVG through its own servers (camo.githubusercontent.com), which is why the separate file approach works
So the flow is:

README.md  →  <img src="./banner.svg">  →  GitHub proxies it safely  ✅
README.md  →  inline <svg>...</svg>     →  GitHub strips the styles  ❌
README.md  →  style="background:..."   →  Stripped entirely          ❌
In short: GitHub treats README content as untrusted HTML and sanitizes it. But a .svg file in your repo is treated as a static asset — it gets rendered as-is through GitHub's image proxy, which is why the banner works as a separate file referenced with <img>.

That's the standard approach all GitHub profile READMEs use for custom styled banners — the SVG lives in the repo, the README just points to it with a plain <img> tag.

