<svg width="860" height="200" viewBox="0 0 860 200" role="img" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <title>Jeevananthan A — Program Analyst · PSG Hospital</title>
  <desc>Dark cyberpunk banner with embedded logo, name, title and skill pills</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#0f1d2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF2EF7"/>
      <stop offset="100%" stop-color="#00F5C4"/>
    </linearGradient>
    <clipPath id="logoClip">
      <circle cx="84" cy="100" r="44"/>
    </clipPath>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="url(#bg)" rx="0"/>
  <rect width="860" height="200" fill="url(#grid)" rx="0"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="860" height="3" fill="url(#accent)"/>

  <!-- Glow dots top-right -->
  <circle cx="828" cy="22" r="5" fill="#00F5C4" opacity="0.9"/>
  <circle cx="828" cy="22" r="11" fill="#00F5C4" opacity="0.12"/>
  <circle cx="844" cy="36" r="3" fill="#FF2EF7" opacity="0.7"/>

  <!-- Location -->
  <text x="815" y="19" text-anchor="end" font-family="monospace" font-size="10" fill="#00F5C4" opacity="0.8" letter-spacing="1.5">TAMIL NADU, INDIA</text>

  <!-- Logo dashed ring -->
  <circle cx="84" cy="100" r="50" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Logo background circle -->
  <circle cx="84" cy="100" r="44" fill="#ffffff"/>
  <!-- Embedded logo image -->
  <image x="40" y="56" width="88" height="88" clip-path="url(#logoClip)"
    href="data:image/jpeg;base64,"/>

  <!-- NAME -->
  <text x="152" y="78" font-family="monospace" font-weight="700" font-size="32" letter-spacing="3" fill="url(#accent)">JEEVANANTHAN A</text>

  <!-- Role -->
  <text x="153" y="103" font-family="monospace" font-size="12" fill="#8892a4" letter-spacing="2.5">PROGRAM ANALYST  ·  PSG HOSPITAL</text>

  <!-- Thin divider -->
  <line x1="153" y1="114" x2="730" y2="114" stroke="url(#accent)" stroke-width="0.5" opacity="0.35"/>

  <!-- Tagline -->
  <text x="153" y="132" font-family="monospace" font-size="12" fill="#00F5C4" letter-spacing="1">Full Stack Developer  ·  Future AI Engineer</text>

  <!-- Skill pills row -->
  <rect x="153" y="146" width="112" height="22" rx="11" fill="none" stroke="#FF2EF7" stroke-width="0.8"/>
  <text x="209" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#FF2EF7">React &amp; Node.js</text>

  <rect x="273" y="146" width="88" height="22" rx="11" fill="none" stroke="#00F5C4" stroke-width="0.8"/>
  <text x="317" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#00F5C4">Oracle · SQL</text>

  <rect x="369" y="146" width="108" height="22" rx="11" fill="none" stroke="#A78BFA" stroke-width="0.8"/>
  <text x="423" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#A78BFA">Learning Python</text>

  <rect x="485" y="146" width="108" height="22" rx="11" fill="none" stroke="#38BDF8" stroke-width="0.8"/>
  <text x="539" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#38BDF8">Linux &amp; Docker</text>

  <rect x="601" y="146" width="104" height="22" rx="11" fill="none" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="653" y="161" text-anchor="middle" font-family="monospace" font-size="10" fill="#F59E0B">AI Engineering</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="197" width="860" height="3" fill="url(#accent)"/>
</svg>
